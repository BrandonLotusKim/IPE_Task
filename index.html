<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="정보처리기사 두음 암기 퀴즈 페이지">
  <meta property="og:title" content="정보처리기사 두음 퀴즈">
  <meta property="og:description" content="과목 선택부터 채점 결과, 전체 답안지까지 한 번에 정리하는 암기 퀴즈">
  <meta property="og:image" content="https://brandonlotuskim.github.io/IPE_Task/thumbnail-20260331.png">
  <meta property="og:image:secure_url" content="https://brandonlotuskim.github.io/IPE_Task/thumbnail-20260331.png">
  <meta property="og:image:url" content="https://brandonlotuskim.github.io/IPE_Task/thumbnail-20260331.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://brandonlotuskim.github.io/IPE_Task/thumbnail-20260331.png">
  <meta property="og:url" content="https://brandonlotuskim.github.io/IPE_Task/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <title>정보처리기사 두음 퀴즈</title>
  <style>
    :root {
      --wood-1: #ba8a58;
      --wood-2: #7b532f;
      --board-1: #234234;
      --board-2: #162a20;
      --chalk: #edf5e9;
      --chalk-soft: rgba(237, 245, 233, 0.72);
      --accent: #f3d17c;
      --line: rgba(237, 245, 233, 0.12);
      --panel: rgba(18, 53, 39, 0.88);
      --ok-bg: rgba(54, 119, 80, 0.94);
      --ok-tx: #ddffe8;
      --ng-bg: rgba(128, 59, 52, 0.94);
      --ng-tx: #ffe4dd;
      --board-min-height: 840px;
      --quiz-min-height: 840px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--chalk);
      background:
        radial-gradient(circle at top, rgba(255, 223, 154, 0.18), transparent 24%),
        linear-gradient(180deg, #c09562 0%, #946a42 20%, #6d4c2f 100%);
    }
    .frame {
      width: min(1020px, 100%);
      min-height: var(--board-min-height);
      border: 14px solid var(--wood-2);
      border-radius: 30px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.05), transparent 30%),
        linear-gradient(180deg, var(--board-1), var(--board-2));
      box-shadow:
        inset 0 0 0 3px rgba(67, 41, 20, 0.55),
        inset 0 0 120px rgba(255,255,255,0.03),
        0 28px 60px rgba(12, 18, 15, 0.36);
      position: relative;
    }
    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 84% 20%, rgba(255,255,255,0.04), transparent 16%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.016) 0 2px, transparent 2px 54px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0 3px, transparent 3px 62px);
      pointer-events: none;
    }
    .screen {
      position: relative;
      z-index: 1;
      min-height: var(--board-min-height);
      padding: 40px;
    }
    .start-screen {
      display: flex;
      align-items: center;
      width: 100%;
      padding-top: 10px;
      padding-bottom: 30px;
    }
    .hidden { display: none; }
    .result-box.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }
    .hero {
      min-height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
      gap: 22px;
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.24em;
      color: var(--accent);
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 58px);
      line-height: 1.06;
      letter-spacing: -0.05em;
    }
    .lead {
      max-width: 700px;
      margin: 0 0 8px;
      color: var(--chalk-soft);
      font-size: 18px;
      line-height: 1.8;
    }
    .subject-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-content: start;
      justify-content: stretch;
      width: 100%;
      margin: 0;
    }
    .hero > * {
      width: 100%;
      text-align: left;
    }
    .subject-card, .panel, .result-box {
      border-radius: 26px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
        var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .subject-card {
      position: relative;
      padding: 40px 72px 40px 28px;
      text-align: left;
      color: var(--chalk);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease;
    }
    .subject-card::after {
      content: ">";
      position: absolute;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      color: rgba(243, 209, 124, 0.88);
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      opacity: 0.9;
      transition: transform .16s ease, opacity .16s ease;
    }
    .subject-card:hover {
      transform: translateY(-3px);
      border-color: rgba(243, 209, 124, 0.34);
    }
    .subject-card:hover::after {
      transform: translateY(-50%) translateX(4px);
      opacity: 1;
    }
    .subject-card strong {
      display: block;
      margin-bottom: 14px;
      font-size: 32px;
      color: var(--accent);
    }
    .subject-card span {
      display: block;
      color: var(--chalk-soft);
      font-size: 17px;
      line-height: 1.85;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      align-items: flex-start;
    }
    .topbar h2 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 40px);
      color: var(--accent);
      letter-spacing: -0.04em;
    }
    .topbar p {
      margin: 0;
      color: var(--chalk-soft);
      font-size: 17px;
    }
    .topbar-actions {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(243, 209, 124, 0.1);
      border: 1px solid rgba(243, 209, 124, 0.18);
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
    }
    .quiz-layout {
      display: grid;
      gap: 18px;
    }
    #quiz-screen {
      position: relative;
      min-height: var(--quiz-min-height);
      padding-bottom: 132px;
    }
    #quiz-screen.hidden { display: none; }
    .result-box.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }
    .panel { padding: 30px; }
    .question-label {
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .question-text {
      margin: 0;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.32;
      letter-spacing: -0.04em;
    }
    .input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .answer-input {
      flex: 1 1 320px;
      min-width: 0;
      padding: 17px 20px;
      border-radius: 18px;
      border: 1px solid rgba(237, 245, 233, 0.18);
      background: rgba(7, 24, 17, 0.52);
      color: var(--chalk);
      font-size: 20px;
      font-weight: 800;
      outline: none;
    }
    .answer-input::placeholder { color: rgba(237, 245, 233, 0.38); }
    .answer-input:focus {
      border-color: rgba(243, 209, 124, 0.55);
      box-shadow: 0 0 0 5px rgba(243, 209, 124, 0.08);
    }
    .answer-input.attention {
      animation: answerBlink .72s ease 3;
      border-color: rgba(243, 209, 124, 0.92);
      box-shadow: 0 0 0 7px rgba(243, 209, 124, 0.18), 0 0 28px rgba(243, 209, 124, 0.24);
    }
    @keyframes answerBlink {
      0%, 100% {
        border-color: rgba(237, 245, 233, 0.18);
        box-shadow: none;
      }
      50% {
        border-color: rgba(243, 209, 124, 0.96);
        box-shadow: 0 0 0 8px rgba(243, 209, 124, 0.2), 0 0 32px rgba(243, 209, 124, 0.28);
      }
    }
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.01em;
      transition: transform .16s ease, opacity .16s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .primary {
      background: linear-gradient(180deg, #f2d47d 0%, #d2a94d 100%);
      color: #2d2210;
    }
    .primary.is-next {
      background: linear-gradient(180deg, #d9f29b 0%, #9cc458 100%);
      color: #20300f;
      box-shadow: 0 10px 22px rgba(103, 145, 42, 0.22);
    }
    .secondary {
      background: rgba(237, 245, 233, 0.08);
      color: var(--chalk);
      border: 1px solid rgba(237, 245, 233, 0.12);
    }
    .ghost {
      background: rgba(243, 209, 124, 0.08);
      color: var(--accent);
      border: 1px solid rgba(243, 209, 124, 0.18);
    }
    .result-box {
      position: relative;
      min-height: 260px;
      padding: 24px 26px;
      border-radius: 26px;
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      transition: opacity .16s ease;
    }
    .result-box.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }
    .result-box.hidden > * {
      opacity: 0;
    }
    .result-box.success {
      background: linear-gradient(180deg, rgba(84, 158, 109, 0.24), var(--ok-bg));
      border-color: rgba(221, 255, 232, 0.2);
    }
    .result-box.error {
      background: linear-gradient(180deg, rgba(177, 91, 79, 0.22), var(--ng-bg));
      border-color: rgba(255, 228, 220, 0.18);
    }
    .result-title {
      margin: 0 0 10px;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .result-box.success .result-title { color: var(--ok-tx); }
    .result-box.error .result-title { color: var(--ng-tx); }
    .result-text {
      margin: 0;
      white-space: pre-line;
      font-size: 18px;
      line-height: 1.95;
      font-weight: 800;
      color: #fffef8;
    }
    .result-actions { margin-top: 18px; }
    .quiz-nav {
      position: absolute;
      left: 40px;
      right: 40px;
      bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      pointer-events: none;
    }
    .nav-button {
      min-width: 134px;
      border-radius: 999px;
      padding: 16px 24px;
      background: rgba(237, 245, 233, 0.08);
      color: var(--chalk);
      border: 1px solid rgba(237, 245, 233, 0.14);
      box-shadow: 0 10px 24px rgba(6, 17, 13, 0.18);
      pointer-events: auto;
    }
    @media (max-width: 720px) {
      body { padding: 12px; }
      .frame {
        min-height: auto;
        border-width: 10px;
      }
      .screen {
        min-height: auto;
        padding: 22px;
      }
      .hero { min-height: auto; }
      .hero > * {
      width: 100%;
      text-align: left;
    }
    .subject-card, .panel, .result-box { border-radius: 22px; }
      .input-wrap { flex-direction: column; }
      .button-row, .topbar-actions { width: 100%; }
      .button-row button, .topbar-actions button, .input-wrap .primary { width: 100%; }
      .result-box {
        min-height: 280px;
        padding: 20px 18px;
      }
      .quiz-nav {
        left: 22px;
        right: 22px;
        bottom: 22px;
        gap: 12px;
      }
      .quiz-nav .nav-button {
        min-width: 0;
        width: calc(50% - 6px);
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <section id="start-screen" class="screen start-screen">
      <div class="hero">
        <div>
          <div class="eyebrow">Mnemonic Drill</div>
          <h1>정보처리기사 두음 암기 페이지</h1>
        </div>
        <p class="lead">과목군을 선택하고 문제를 본 뒤 두음을 입력하세요. 칠판 위에서 문제를 풀고, 노트 형식으로 상세 설명과 풀이 결과를 정리해 볼 수 있습니다.</p>
        <div class="subject-grid">
          <button class="subject-card" data-group="first" type="button">
            <strong>1~6과목</strong>
            <span>소프트웨어 설계, 데이터 모델링, UI, UML, 보안, 인터페이스 등 기초 이론 중심</span>
          </button>
          <button class="subject-card" data-group="second" type="button">
            <strong>7~12과목</strong>
            <span>트랜잭션, SQL, 테스트, 운영체제, 네트워크, 보안, 클라우드 등 실무 빈출 주제</span>
          </button>
        </div>
      </div>
    </section>

    <section id="quiz-screen" class="screen hidden">
      <div class="topbar">
        <div>
          <h2 id="quiz-title"></h2>
          <p id="quiz-subtitle"></p>
        </div>
        <div class="topbar-actions">
          <div id="progress-badge" class="badge"></div>
          <button id="finish-button" class="ghost" type="button">문제 풀이 종료</button>
        </div>
      </div>

      <div class="quiz-layout">
        <div class="panel">
          <p class="question-label">Question</p>
          <p id="question-text" class="question-text"></p>
          <div class="input-wrap">
            <input id="answer-input" class="answer-input" type="text" placeholder="두음을 입력하세요" autocomplete="off">
            <button id="submit-button" class="primary" type="button">정답 확인</button>
          </div>
        </div>

        <div id="result-box" class="result-box hidden">
          <h3 id="result-title" class="result-title"></h3>
          <p id="result-text" class="result-text"></p>
          <div class="button-row result-actions">
            <button id="detail-button" class="ghost" type="button">상세한 설명</button>
            <button id="restart-button" class="ghost" type="button">과목 다시 선택</button>
          </div>
        </div>
      </div>

      <div class="quiz-nav">
        <button id="prev-button" class="secondary nav-button" type="button">이전 문제</button>
        <button id="next-button" class="secondary nav-button" type="button">다음 문제</button>
      </div>
    </section>
  </div>

  <script>
const firstGroup = [
{ question: "소프트웨어 생명주기 모델 종류", answer: "폭프나반", description: "폭포수 / 프로토타이핑 / 나선형 / 반복적" },
      { question: "나선형 모델 절차", answer: "계위개고", description: "계획 및 정의 / 위험 분석 / 개발 / 고객 평가" },
      { question: "럼바우의 객체 지향 분석 절차", answer: "객동기", description: "객체 / 동적 / 기능" },
      { question: "소프트웨어 아키텍처 4+1 뷰", answer: "유논프구배", description: "유스케이스 / 논리 / 프로세스 / 구현 / 배포" },
      { question: "디자인 패턴 구성 요소", answer: "패문솔사결샘", description: "패턴 이름 / 문제 / 솔루션 / 사례 / 결과 / 샘플 코드" },
      { question: "목적에 따른 디자인 패턴 유형", answer: "생구행", description: "생성 / 구조 / 행위" },
      { question: "디자인 패턴 종류 - 생성", answer: "추빌팩프싱", description: "추상 팩토리 / 빌더 / 팩토리 / 프로토타입 / 싱글톤" },
      { question: "디자인 패턴 종류 - 구조", answer: "어브컴데퍼플프", description: "어댑터 / 브릿지 / 컴포지트 / 데코레이터 / 퍼사드 / 플라이웨이트 / 프록시" },
      { question: "디자인 패턴 종류 - 행위", answer: "미인이탬옵스테커비스트메체", description: "미디에이터 / 인터프리터 / 이터레이터 / 템플릿 메서드 / 옵저버 / 스테이트 / 커맨드 / 비지터 / 스트래티지 / 메멘토 / Chain of Responsibility" },
      { question: "분석 산출물의 종류", answer: "현기인아소하네", description: "정보 시스템 구성 현황 / 정보 시스템 기능 구성도 / 인터페이스 현황 / 시스템 아키텍처 구성도 / 소프트웨어 구성도 / 하드웨어 구성도 / 네트워크 구성도" },
      { question: "OSI 7계층", answer: "아파서티내다피나다", description: "Application(7) / Presentation(6) / Session(5) / Transport(4) / Network(3) / Data Link(2) / Physical(1)" },
      { question: "DBMS 현행 시스템 분석 시 고려 사항", answer: "가성호기구", description: "가용성 / 성능 / 상호 호환성 / 기술 지원 / 구축 비용" },
      { question: "요구사항 명세 원리 및 검증 항목", answer: "명완검일수추개", description: "명확성 / 완전성 / 검증 가능성 / 일관성 / 수정 용이성 / 추적 가능성 / 개발 후 이용성" },
      { question: "정형 기술 검토", answer: "동워인", description: "동료 검토 / 워크 스루 / 인스펙션" },
      { question: "상세 정형 기술 검토 기법", answer: "관기인워감", description: "관리 리뷰 / 기술 리뷰 / 인스펙션 / 워크 스루 / 감사" },
      { question: "UI 유형", answer: "CGNO", description: "CLI / GUI / NUI / OUI" },
      { question: "UI 설계 원칙", answer: "직유학유", description: "직관성 / 유효성 / 학습성 / 유연성" },
      { question: "UI 설계 지침", answer: "사일단결가표접명오", description: "사용자 중심 / 일관성 / 단순성 / 결과 예측 가능 / 가시성 / 표준화 / 접근성 / 명확성 / 오류 발생 해결" },
      { question: "UI 품질 요구사항", answer: "기신사효유이", description: "기능성 / 신뢰성 / 사용성 / 효율성 / 유지보수성 / 이식성" },

  </script>
  <script>
    const groups = {
      first: { title: "1~6과목", subtitle: "소프트웨어 설계 · UML · 데이터 모델링 · 보안 · 인터페이스", items: firstGroup },
      second: { title: "7~12과목", subtitle: "데이터베이스 · 테스트 · 운영체제 · 네트워크 · 보안 · 클라우드", items: secondGroup }
    };

    let currentGroupKey = null;
    let currentIndex = 0;
    let currentOrder = [];
    let sessionResults = [];
    let summaryWindowRef = null;
    const params = new URLSearchParams(window.location.search);
    const initialGroupKey = params.get("group");
    const initialView = params.get("view");
    let initialPageHtml = "";
    window.addEventListener("load", () => {
      initialPageHtml = document.documentElement.outerHTML;
    }, { once: true });

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const quizTitle = document.getElementById("quiz-title");
    const quizSubtitle = document.getElementById("quiz-subtitle");
    const progressBadge = document.getElementById("progress-badge");
    const questionText = document.getElementById("question-text");
    const answerInput = document.getElementById("answer-input");
    const submitButton = document.getElementById("submit-button");
    const resultBox = document.getElementById("result-box");
    const resultTitle = document.getElementById("result-title");
    const resultText = document.getElementById("result-text");
    const detailButton = document.getElementById("detail-button");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");
    const restartButton = document.getElementById("restart-button");
    const finishButton = document.getElementById("finish-button");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalize(value) {
      return value.replace(/\s+/g, "").trim();
    }

    function getCurrentItems() {
      return groups[currentGroupKey].items;
    }

    function getCurrentItem() {
      return getCurrentItems()[currentOrder[currentIndex]];
    }

    function shuffleIndices(length) {
      const indices = Array.from({ length }, (_, index) => index);
      for (let i = indices.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return indices;
    }

    function resetResult() {
      resultBox.className = "result-box hidden";
      resultTitle.textContent = "";
      resultText.textContent = "";
      submitButton.textContent = "정답 확인";
      submitButton.classList.remove("is-next");
      nextButton.textContent = currentIndex === currentOrder.length - 1 ? "결과 보기" : "다음 문제";
    }

    function showNextState() {
      submitButton.textContent = currentIndex === currentOrder.length - 1 ? "결과 보기" : "다음";
      submitButton.classList.add("is-next");
    }

    function goToNextStep() {
      if (currentIndex === currentOrder.length - 1) {
        openSummaryWindow();
        return;
      }
      currentIndex += 1;
      renderQuestion();
    }

    function pulseAnswerInput() {
      answerInput.classList.remove("attention");
      void answerInput.offsetWidth;
      answerInput.classList.add("attention");
      answerInput.focus();
    }

    function renderQuestion() {
      const items = getCurrentItems();
      const item = getCurrentItem();
      const saved = sessionResults[currentIndex];
      quizTitle.textContent = groups[currentGroupKey].title;
      quizSubtitle.textContent = groups[currentGroupKey].subtitle;
      progressBadge.textContent = `${currentIndex + 1} / ${items.length}`;
      questionText.textContent = item.question;
      answerInput.value = saved ? saved.userAnswerRaw : "";
      answerInput.classList.remove("attention");
      prevButton.disabled = currentIndex === 0;
      resetResult();
      answerInput.focus();
    }
    function showQuiz(groupKey) {
      currentGroupKey = groupKey;
      currentIndex = 0;
      currentOrder = shuffleIndices(groups[groupKey].items.length);
      sessionResults = new Array(currentOrder.length).fill(null);
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      renderQuestion();
    }

    function showStart() {
      currentGroupKey = null;
      currentIndex = 0;
      currentOrder = [];
      sessionResults = [];
      quizScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
      answerInput.value = "";
      resetResult();
    }

    function renderAnswerSheetPage(groupKey) {
      if (!groups[groupKey]) return;

    const summaryItems = ${summaryData};
    const answerSheetItems = ${answerSheetData};
    const list = document.getElementById('result-list');
    const answerSheetButton = document.getElementById('answer-sheet-button');
    function emptySummaryHtml(){return '<article class="empty-card"><h3>아직 채점된 문제가 없습니다.</h3><p>문제를 하나 이상 푼 뒤 결과 페이지를 열면 응답한 문제만 정리해서 보여줍니다.</p></article>';}
    function summaryHtml(items){if(!items.length){return emptySummaryHtml();}return items.map((entry)=>{const className=entry.status==='정답'?'correct':'wrong';return '<article class="item '+className+'"><div class="meta"><span class="order">'+entry.order+'번 문제</span><span class="status '+className+'">'+entry.status+'</span></div><h3>'+entry.question+'</h3><p>입력한 두음: '+entry.userAnswer+'\\n정답 두음: '+entry.answer+'\\n설명: '+entry.description+'</p></article>';}).join('');}
    function answerSheetHtml(items){return items.map((entry)=>'<article class="item answer"><div class="meta"><span class="order">'+entry.order+'번 문제</span><span class="status answer"></span></div><h3>'+entry.question+'</h3><p>정답 두음: '+entry.answer+'\\n설명: '+entry.description+'</p></article>').join('');}
    function rank(entry,mode){if(mode==='wrong') return entry.status==='오답'?0:1; if(mode==='correct') return entry.status==='정답'?0:1; return entry.order-1;}
    function setSummaryMode(mode){document.querySelectorAll('[data-sort]').forEach((item)=>item.classList.toggle('active', item.dataset.sort===mode)); answerSheetButton.classList.remove('is-active');}
    function renderSummary(mode){setSummaryMode(mode); const sorted=[...summaryItems].sort((a,b)=>rank(a,mode)-rank(b,mode)||a.order-b.order); list.innerHTML=summaryHtml(sorted);}
    function renderAnswerSheet(){document.querySelectorAll('[data-sort]').forEach((item)=>item.classList.remove('active')); answerSheetButton.classList.add('is-active'); list.innerHTML=answerSheetHtml(answerSheetItems);}
  <\/script>
</body>
</html>`;

      document.open();
      document.write(page);
      document.close();
    }
    function checkAnswer() {
      const item = getCurrentItem();
      const userAnswerRaw = answerInput.value.trim();
      const normalizedInput = normalize(userAnswerRaw);
      const correct = normalize(item.answer);
      if (!normalizedInput) {
        pulseAnswerInput();
        return;
      }
      const isCorrect = normalizedInput === correct;
      sessionResults[currentIndex] = { userAnswerRaw, isCorrect };
      resultBox.className = isCorrect ? "result-box success" : "result-box error";
      resultTitle.textContent = isCorrect ? "정답입니다!" : "오답입니다!";
      resultText.textContent = `입력한 두음: ${userAnswerRaw}\n정답: ${item.answer}\n설명: ${item.description}`;
      showNextState();
      nextButton.textContent = currentIndex === currentOrder.length - 1 ? "결과 보기" : "다음 문제";
      if (currentIndex === currentOrder.length - 1) {
        setTimeout(() => openSummaryWindow(), 120);
      }
    }

    document.querySelectorAll("[data-group]").forEach((button) => button.addEventListener("click", () => showQuiz(button.dataset.group)));
    submitButton.addEventListener("click", () => {
      if (!resultBox.classList.contains("hidden")) {
        goToNextStep();
        return;
      }
      checkAnswer();
    });
    detailButton.addEventListener("click", openDetailWindow);
    finishButton.addEventListener("click", openSummaryWindow);
    restartButton.addEventListener("click", showStart);
    answerInput.addEventListener("animationend", () => {
      answerInput.classList.remove("attention");
    });
    answerInput.addEventListener("input", () => {
      if (answerInput.value.trim()) answerInput.classList.remove("attention");
    });
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        if (!resultBox.classList.contains("hidden")) {
          goToNextStep();
          return;
        }
        checkAnswer();
      }
    });
    prevButton.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        renderQuestion();
      }
    });
    nextButton.addEventListener("click", () => {
      goToNextStep();
    });

    if (initialView === "answer-sheet" && initialGroupKey && groups[initialGroupKey]) {
      renderAnswerSheetPage(initialGroupKey);
    } else if (initialGroupKey && groups[initialGroupKey]) {
      showQuiz(initialGroupKey);
    }
  </script>
</body>
</html>
